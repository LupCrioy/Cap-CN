name: "Build Windows"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install

      - name: Run cap-setup (downloads FFmpeg, configures env)
        run: pnpm -w cap-setup
        env:
          RUST_TARGET_TRIPLE: x86_64-pc-windows-msvc

      - name: Build desktop binaries
        shell: bash
        run: ./scripts/build-desktop-binaries.sh x86_64-pc-windows-msvc

      - name: Run prepare script
        working-directory: apps/desktop
        run: pnpm run preparescript
        env:
          CI: false

      - name: Clear signing keys and build
        shell: pwsh
        run: |
          # Remove any cached signing keys
          Remove-Item -Path "$env:USERPROFILE\.tauri" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$env:LOCALAPPDATA\tauri" -Recurse -Force -ErrorAction SilentlyContinue
          echo "Cleared cached signing keys"

      - name: Build Tauri app (no signing)
        continue-on-error: true
        working-directory: apps/desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          CI: false
          RUST_TARGET_TRIPLE: x86_64-pc-windows-msvc

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Cap-CN-Windows
          path: |
            **/target/**/bundle/nsis/*.exe
            **/target/**/bundle/msi/*.msi
